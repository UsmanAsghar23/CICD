services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-preview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-preview}
      POSTGRES_DB: ${POSTGRES_DB:-preview}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-preview} -d ${POSTGRES_DB:-preview}"]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-preview}:${POSTGRES_PASSWORD:-preview}@postgres:5432/${POSTGRES_DB:-preview}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-secret}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PREVIEW_BASE_DOMAIN: ${PREVIEW_BASE_DOMAIN:-preview.example.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  demo-app:
    build:
      context: .
      dockerfile: apps/demo-app/Dockerfile
      args:
        BUILD_TIME: ${BUILD_TIME:-}
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      PR_NUMBER: ${PR_NUMBER:-local}
      BRANCH: ${BRANCH:-main}
      COMMIT_SHA: ${COMMIT_SHA:-dev}
      BUILD_TIME: ${BUILD_TIME:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
